<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Direction B: The Prompt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e10;
  --bg-input: #161619;
  --text: #e8e8ed;
  --text-dim: #6b6b75;
  --text-ghost: #3a3a42;
  --accent: #7b93ff;
  --accent-soft: rgba(123, 147, 255, 0.06);
  --accent-glow: rgba(123, 147, 255, 0.12);
  --border: #222228;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

.prompt-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  position: relative;
}

/* ── Wordmark (top-left, subtle) ── */
.prompt-wordmark {
  position: absolute;
  top: 32px;
  left: 36px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0.7;
}

.prompt-wordmark-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.6;
}

/* ── Corner links (top-right, minimal) ── */
.prompt-corner {
  position: absolute;
  top: 32px;
  right: 36px;
  display: flex;
  gap: 4px;
}

.corner-btn {
  font-size: 12px;
  color: var(--text-ghost);
  background: none;
  border: none;
  font-family: var(--font);
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 6px;
  transition: color 0.2s, background 0.2s;
}

.corner-btn:hover {
  color: var(--text-dim);
  background: rgba(255,255,255,0.03);
}

/* ── Center content ── */
.prompt-center {
  width: 100%;
  max-width: 580px;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: -60px;
}

.prompt-headline {
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -1.2px;
  color: var(--text);
  margin-bottom: 48px;
  text-align: center;
  line-height: 1.2;
}

.prompt-headline-dim {
  color: var(--text-dim);
  font-weight: 400;
}

/* ── The input ── */
.prompt-input-area {
  width: 100%;
  position: relative;
}

.prompt-textarea {
  width: 100%;
  min-height: 120px;
  padding: 24px 24px 60px;
  font-size: 16px;
  line-height: 1.65;
  font-family: var(--font);
  color: var(--text);
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 20px;
  outline: none;
  resize: none;
  transition: border-color 0.25s, box-shadow 0.25s;
}

.prompt-textarea::placeholder {
  color: var(--text-ghost);
}

.prompt-textarea:focus {
  border-color: rgba(123, 147, 255, 0.4);
  box-shadow: 0 0 0 4px var(--accent-soft), 0 8px 40px rgba(0,0,0,0.3);
}

.prompt-input-footer {
  position: absolute;
  bottom: 14px;
  left: 20px;
  right: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.prompt-hint {
  font-size: 12px;
  color: var(--text-ghost);
  display: flex;
  align-items: center;
  gap: 6px;
}

.prompt-send {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s, opacity 0.15s;
  opacity: 0.85;
}

.prompt-send:hover {
  transform: scale(1.08);
  opacity: 1;
}

/* ── Rotating suggestions ── */
.prompt-suggestions {
  margin-top: 32px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.prompt-suggestion {
  font-size: 13px;
  color: var(--text-ghost);
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 16px;
  font-family: var(--font);
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}

.prompt-suggestion:hover {
  color: var(--text-dim);
  border-color: var(--text-ghost);
  background: rgba(255,255,255,0.02);
}

/* ── Bottom whisper ── */
.prompt-whisper {
  position: absolute;
  bottom: 36px;
  text-align: center;
  font-size: 12px;
  color: var(--text-ghost);
  opacity: 0.6;
  max-width: 400px;
  line-height: 1.5;
}

.prompt-whisper a {
  color: var(--text-dim);
  text-decoration: none;
  border-bottom: 1px solid var(--border);
  transition: color 0.2s;
}

.prompt-whisper a:hover {
  color: var(--text);
}

/* ── Transformation hint ── */
.transform-hint {
  margin-top: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  opacity: 0.5;
  transition: opacity 0.3s;
}

.transform-hint:hover {
  opacity: 0.8;
}

.transform-arrow {
  color: var(--text-ghost);
  animation: gentleBounce 2.5s ease-in-out infinite;
}

@keyframes gentleBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(4px); }
}

.transform-label {
  font-size: 12px;
  color: var(--text-ghost);
  letter-spacing: 0.02em;
}

.transform-preview {
  display: flex;
  gap: 3px;
  align-items: flex-end;
}

.transform-bar {
  width: 32px;
  background: var(--border);
  border-radius: 3px 3px 0 0;
}

.transform-bar:nth-child(1) { height: 20px; }
.transform-bar:nth-child(2) { height: 45px; background: rgba(123, 147, 255, 0.15); }
.transform-bar:nth-child(3) { height: 30px; }
.transform-bar:nth-child(4) { height: 12px; }
</style>
</head>
<body>
<div class="prompt-page">

  <div class="prompt-wordmark">
    <span class="prompt-wordmark-dot"></span>
    Claude for Designers
  </div>

  <div class="prompt-corner">
    <button class="corner-btn">Open folder</button>
    <button class="corner-btn">Help</button>
  </div>

  <div class="prompt-center">
    <h1 class="prompt-headline">
      Describe what you'd like to build.
    </h1>

    <div class="prompt-input-area">
      <textarea class="prompt-textarea" placeholder="A clean, modern portfolio website with a dark theme, a grid of my design work, and a contact form..."></textarea>
      <div class="prompt-input-footer">
        <span class="prompt-hint">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13 8l-5 5-5-5M8 13V3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Enter to send
        </span>
        <button class="prompt-send" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <div class="prompt-suggestions">
      <button class="prompt-suggestion">A landing page for my startup</button>
      <button class="prompt-suggestion">A personal portfolio</button>
      <button class="prompt-suggestion">A recipe collection site</button>
    </div>

    <!-- Transformation hint -->
    <div class="transform-hint">
      <svg class="transform-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 3v10M4 9l4 4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="transform-label">Your workspace appears once you start</span>
      <div class="transform-preview">
        <div class="transform-bar"></div>
        <div class="transform-bar"></div>
        <div class="transform-bar"></div>
        <div class="transform-bar"></div>
      </div>
    </div>
  </div>

  <div class="prompt-whisper">
    Already have files? <a href="#">Open a project folder</a> instead.
  </div>

</div>
</body>
</html>
